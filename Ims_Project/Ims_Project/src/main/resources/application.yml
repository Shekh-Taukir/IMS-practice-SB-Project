resilience4j:
  retry:
    instances:
      inventoryRetry:
        maxRetryAttempts: 5
        waitDuration: 1s

  ratelimiter:
    instances:
      inventoryRateLimiter:
        limitRefreshPeriod: 10s
        limitForPeriod: 2
        timeoutDuration: 100ms