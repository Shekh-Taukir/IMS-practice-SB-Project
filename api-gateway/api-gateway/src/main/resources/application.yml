spring:
  application:
    name: api-gateway

#//Start Apr 01, 2026 TaukirS (ER 1107 - API gateway config changes)
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ims-project
              uri: lb://IMS-PROJECT
              predicates:
                - Path=/api/v1/ims/**
              filters:
                - StripPrefix=2
#                //Apr 04, 2026 TaukirS (ER 1112 - api gateway global filter implmentation)
                - name: LoggingIMSFilter

            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
#                  - Path=/api/v1/inventory/**
                  - Path=/inventory/**
#              filters:
#                - StripPrefix=2
#//End Apr 01, 2026 TaukirS (ER 1107 - API gateway config changes)

#Server port config
server:
  port: 9001

#//Start Apr 01, 2026 TaukirS (ER 1107 - API gateway config changes)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true
#//End Apr 01, 2026 TaukirS (ER 1107 - API gateway config changes)